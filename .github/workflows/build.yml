name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Cleanup old dev certificates
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        pip3 install --break-system-packages PyJWT > /dev/null 2>&1
        python3 -c "
import jwt, time, requests, json
key = open('/tmp/asc_key.p8' if __import__('os').path.exists('/tmp/asc_key.p8') else '','r').read() if __import__('os').path.exists('/tmp/asc_key.p8') else ''
if not key:
    import base64, os
    key_data = base64.b64decode(os.environ['ASC_API_KEY_CONTENT'])
    with open('/tmp/asc_key.p8','wb') as f: f.write(key_data)
    key = key_data.decode()
token = jwt.encode({'iss':'2be0734f-943a-4d61-9dc9-5d9045c46fec','iat':int(time.time()),'exp':int(time.time())+1200,'aud':'appstoreconnect-v1'}, key, algorithm='ES256', headers={'kid':'WDXGY9WX55'})
h = {'Authorization': f'Bearer {token}'}
r = requests.get('https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DEVELOPMENT', headers=h)
certs = r.json().get('data',[])
if len(certs) > 3:
    certs.sort(key=lambda c: c['attributes']['expirationDate'])
    for c in certs[:-2]:
        requests.delete(f'https://api.appstoreconnect.apple.com/v1/certificates/{c[\"id\"]}', headers=h)
        print(f'Revoked {c[\"id\"]}')
print(f'{len(certs)} certs found, kept 2')
" || echo "Cert cleanup skipped"

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 0 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Patch Info.plist build number
      run: |
        sed -i "" "s|<string>\$(CURRENT_PROJECT_VERSION)</string>|<string>$BUILD_NUM</string>|" SeisoReport/Resources/Info.plist
        sed -i "" "/<key>CFBundleVersion<\/key>/{n;s|<string>[^<]*</string>|<string>$BUILD_NUM</string>|;}" SeisoReport/Resources/Info.plist
        grep -A1 CFBundleVersion SeisoReport/Resources/Info.plist

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme SeisoReport \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/SeisoReport.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/SeisoReport.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Upload IPA
      run: |
        IPA=$(find build/export -name "*.ipa" | head -1)
        echo "Found IPA: $IPA"
        xcrun altool --upload-app \
          -f "$IPA" \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec
